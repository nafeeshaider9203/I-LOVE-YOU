<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Do You Love Me?</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 105, 180, 0.35), transparent 20%),
        radial-gradient(circle at bottom right, rgba(138, 43, 226, 0.35), transparent 25%),
        linear-gradient(135deg, #1a1028, #2d0b3d 50%, #12081f);
    }

    .heart {
      position: absolute;
      font-size: 24px;
      animation: floatHeart 6s linear infinite;
      opacity: 0.75;
    }

    @keyframes floatHeart {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0;
      }
      20% {
        opacity: 0.7;
      }
      100% {
        transform: translateY(-120px) scale(1.3);
        opacity: 0;
      }
    }

    .box {
      width: min(440px, calc(100% - 24px));
      padding: 30px 24px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .box::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.13), transparent);
      pointer-events: none;
    }

    h1 {
      margin: 0 0 18px;
      color: #fff7fd;
      font-size: 2rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
    }

    .question {
      color: #ffe0f1;
      margin-bottom: 24px;
      font-size: 1.1rem;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      position: relative;
      min-height: 70px;
    }

    .btn {
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      padding: 12px 24px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover {
      transform: scale(1.06);
    }

    #yesBtn {
      background: linear-gradient(135deg, #ff5ca8, #ff7eb6);
      color: white;
      box-shadow: 0 10px 24px rgba(255, 92, 168, 0.38);
    }

    #noBtn {
      position: absolute;
      background: linear-gradient(135deg, #7d5cff, #9d7fff);
      color: white;
      box-shadow: 0 10px 24px rgba(125, 92, 255, 0.38);
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    .message {
      margin-top: 22px;
      display: none;
      color: #ffecf7;
      font-weight: 700;
      animation: popIn 0.4s ease;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.85);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>💖 Do You Love Me?</h1>
    <div class="question">Please answer honestly...</div>

    <div class="buttons" id="buttonZone">
      <button class="btn" id="yesBtn">Yes</button>
      <button class="btn" id="noBtn">No</button>
    </div>

    <div class="message" id="message">Yay! I love you too ❤️</div>
  </div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const message = document.getElementById("message");
    const buttonZone = document.getElementById("buttonZone");

    let noBtnBounds = { width: 0, height: 0 };

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.textContent = "💗";
      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.top = Math.random() * window.innerHeight + "px";
      heart.style.animationDuration = (4 + Math.random() * 4) + "s";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }

    setInterval(createHeart, 500);

    function moveNoButton() {
      const zoneRect = buttonZone.getBoundingClientRect();
      const maxX = Math.max(0, zoneRect.width - noBtn.offsetWidth);
      const maxY = Math.max(0, zoneRect.height - noBtn.offsetHeight);

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
      noBtn.style.transform = "translate(0, 0)";
    }

    function updateNoButtonSize() {
      noBtnBounds.width = noBtn.offsetWidth;
      noBtnBounds.height = noBtn.offsetHeight;
    }

    function onNoHover() {
      moveNoButton();
    }

    noBtn.addEventListener("mouseenter", onNoHover);
    noBtn.addEventListener("mousemove", onNoHover);
    noBtn.addEventListener("click", (e) => {
      e.preventDefault();
      moveNoButton();
    });

    yesBtn.addEventListener("click", () => {
      message.style.display = "block";
      message.textContent = "Yay! I love you too ❤️";
    });

    window.addEventListener("resize", () => {
      setTimeout(moveNoButton, 50);
    });

    updateNoButtonSize();
    setTimeout(moveNoButton, 50);
    setInterval(moveNoButton, 1800);
  </script>
</body>
</html>
